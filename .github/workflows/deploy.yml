name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: https://ops.agno.com.tr

      - name: Copy static assets to standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      # better-sqlite3'ü prebuilt binary ile değiştir (glibc uyumluluğu için)
      - name: Replace better-sqlite3 with prebuilt binary (Node 20 ABI 115)
        run: |
          curl -L -o bsq.tar.gz "https://github.com/WiseLibs/better-sqlite3/releases/download/v11.10.0/better-sqlite3-v11.10.0-node-v115-linux-x64.tar.gz"
          tar -xzf bsq.tar.gz
          cp build/Release/better_sqlite3.node .next/standalone/node_modules/better-sqlite3/build/Release/better_sqlite3.node
          echo "Binary replaced: $(file build/Release/better_sqlite3.node)"

      - name: Prepare data directory placeholder
        run: mkdir -p .next/standalone/data

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: .next/standalone/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/.cache/**
            data/*.sqlite
            data/*.sqlite-shm
            data/*.sqlite-wal

      - name: Restart cPanel Node.js App
        run: |
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/NodeJSApp/restart_app?app_name=${{ secrets.CPANEL_APP_NAME }}" \
            -o /tmp/restart.json || true
          cat /tmp/restart.json || true
          echo "Restart attempted."
        continue-on-error: true
