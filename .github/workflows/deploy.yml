name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: https://ops.agno.com.tr

      - name: Copy static assets to standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r migrations .next/standalone/migrations

      # better-sqlite3'ü eski glibc (AlmaLinux8 = glibc 2.28) üzerinde derle
      - name: Build better-sqlite3 for old GLIBC (AlmaLinux8 / glibc 2.28)
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            almalinux:8 \
            bash -euo pipefail -c '
              dnf install -y -q curl make gcc-c++ python3
              curl -fsSL https://rpm.nodesource.com/setup_20.x | bash - >/dev/null 2>&1
              dnf install -y -q nodejs
              node --version
              # Build from the full source in the original node_modules (has binding.gyp)
              cd /workspace/node_modules/better-sqlite3
              npm rebuild --build-from-source 2>&1
              cp build/Release/better_sqlite3.node /workspace/bsq_compiled.node
              echo "Binary built: $(file /workspace/bsq_compiled.node)"
            '
          # Replace ALL copies in standalone (node_modules/ AND .next/ bundled copies)
          find .next/standalone -name "better_sqlite3.node" -exec cp bsq_compiled.node {} \;
          echo "Replaced binaries:"
          find .next/standalone -name "better_sqlite3.node"

      - name: Prepare data directory placeholder
        run: mkdir -p .next/standalone/data

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: .next/standalone/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/.cache/**
            data/*.sqlite
            data/*.sqlite-shm
            data/*.sqlite-wal

      - name: Restart cPanel Node.js App via Fileman restart.txt
        run: |
          # Create/update tmp/restart.txt to trigger Passenger-style restart
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/save_file_content" \
            --data-urlencode "dir=/home/agnocom/ops.agno.com.tr/home/agnocom/ops.agno.com.tr/tmp" \
            --data-urlencode "file=restart.txt" \
            --data-urlencode "content=$(date -u)" \
            | tee /tmp/restart.json
          echo "Restart triggered."
        continue-on-error: true
