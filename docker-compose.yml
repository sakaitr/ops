services:
  ops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ops
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/opsdesk.sqlite
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NEXT_PUBLIC_APP_URL=http://212.64.201.208:3000
      # Override the following in a .env file or directly here:
      # - JWT_SECRET=change_this_secret
    volumes:
      - ops_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  ops_data:
